<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ChuquiWeb · Iniciar Sesión</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:      #0d0f14;
      --surface: #161920;
      --border:  #252933;
      --accent:  #f0a500;
      --accent2: #e05c1a;
      --text:    #e8eaf0;
      --muted:   #666e85;
      --danger:  #ea5455;
      --radius:  14px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      /* Sutil textura de fondo */
      background-image:
        radial-gradient(ellipse 80% 60% at 50% -20%, rgba(240,165,0,0.12), transparent),
        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(224,92,26,0.08), transparent);
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      width: 100%;
      max-width: 420px;
      padding: 2.5rem 2rem;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
    }

    /* Logo */
    .logo {
      text-align: center;
      font-family: 'Syne', sans-serif;
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -1px;
      margin-bottom: 0.25rem;
    }
    .logo span { color: var(--accent); }
    .subtitle {
      text-align: center;
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 2rem;
      letter-spacing: 0.5px;
    }

    /* Inputs */
    .form-group { margin-bottom: 1rem; }
    label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--muted);
      margin-bottom: 0.4rem;
    }
    input[type="email"],
    input[type="password"] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.7rem 1rem;
      color: var(--text);
      font-size: 0.9rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: var(--accent); }

    /* Botón principal */
    .btn-login {
      width: 100%;
      padding: 0.8rem;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #000;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: filter 0.2s, transform 0.15s;
      margin-top: 0.5rem;
    }
    .btn-login:hover { filter: brightness(1.1); transform: translateY(-1px); }
    .btn-login:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin: 1.5rem 0;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1;
      height: 1px; background: var(--border);
    }
    .divider span { font-size: 0.78rem; color: var(--muted); white-space: nowrap; }

    /* Botón Google */
    .btn-google {
      width: 100%;
      padding: 0.75rem;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      transition: border-color 0.2s, background 0.2s;
    }
    .btn-google:hover { border-color: #4285f4; background: rgba(66,133,244,0.06); }
    .btn-google:disabled { opacity: 0.5; cursor: not-allowed; }
    .google-icon {
      width: 18px; height: 18px;
      flex-shrink: 0;
    }

    /* Error */
    .error-box {
      background: rgba(234,84,85,0.1);
      border: 1px solid rgba(234,84,85,0.3);
      border-radius: 8px;
      padding: 0.7rem 1rem;
      font-size: 0.85rem;
      color: var(--danger);
      margin-top: 1rem;
      display: none;
    }
    .error-box.visible { display: block; }

    /* Spinner */
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(0,0,0,0.3);
      border-top-color: #000;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="card">
  <div class="logo">Chuqui<span>Web</span></div>
  <p class="subtitle">Marketplace de Importadoras · Bolivia</p>

  <!-- ── Formulario email/password ── -->
  <div class="form-group">
    <label>Correo electrónico</label>
    <input type="email" id="email" placeholder="correo@chuquiweb.bo" autocomplete="email">
  </div>
  <div class="form-group">
    <label>Contraseña</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
  </div>

  <button class="btn-login" id="btnLogin" onclick="loginEmail()">
    Iniciar Sesión
  </button>

  <!-- ── Divider ── -->
  <div class="divider"><span>o continuar con</span></div>

  <!-- ── Botón Google ── -->
  <button class="btn-google" id="btnGoogle" onclick="loginGoogle()">
    <svg class="google-icon" viewBox="0 0 48 48">
      <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
      <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
      <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
      <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.35-8.16 2.35-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
    </svg>
    Continuar con Google
  </button>

  <div class="error-box" id="errorBox"></div>
</div>

<!-- ══════════════════════════════════════════════════
     Firebase JS SDK (v9 compat)
══════════════════════════════════════════════════ -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<script>
  // ── Configuración Firebase (tus variables de entorno expuestas al frontend) ──
  // Estas claves son PÚBLICAS (son las del cliente JS, no el service account)
  const firebaseConfig = {
    apiKey:            "{{ firebase_api_key }}",
    authDomain:        "{{ firebase_auth_domain }}",
    projectId:         "{{ firebase_project_id }}",
  };

  firebase.initializeApp(firebaseConfig);
  const auth     = firebase.auth();
  const provider = new firebase.auth.GoogleAuthProvider();

  // Agregar scopes opcionales de Google
  provider.addScope("email");
  provider.addScope("profile");

  // ── Enter en password dispara login ──
  document.getElementById("password").addEventListener("keydown", e => {
    if (e.key === "Enter") loginEmail();
  });

  // ─────────────────────────────────────────────
  // LOGIN EMAIL / PASSWORD
  // ─────────────────────────────────────────────
  async function loginEmail() {
    const email    = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;

    if (!email || !password) {
      mostrarError("Ingresa tu correo y contraseña.");
      return;
    }

    setBusy(true, "btnLogin", "Ingresando...");

    try {
      const res  = await fetch("/login", {
        method:  "POST",
        headers: { "Content-Type": "application/json" },
        body:    JSON.stringify({ email, password }),
      });
      const data = await res.json();

      if (res.ok) {
        window.location.href = data.redirect;
      } else {
        mostrarError(data.error || "Error al iniciar sesión.");
        setBusy(false, "btnLogin", "Iniciar Sesión");
      }
    } catch {
      mostrarError("Error de conexión. Verifica tu red.");
      setBusy(false, "btnLogin", "Iniciar Sesión");
    }
  }

  // ─────────────────────────────────────────────
  // LOGIN GOOGLE (popup)
  // ─────────────────────────────────────────────
  async function loginGoogle() {
    setBusy(true, "btnGoogle", "Conectando con Google...");
    ocultarError();

    try {
      // 1) Firebase abre el popup de Google
      const result  = await auth.signInWithPopup(provider);
      const idToken = await result.user.getIdToken();

      // 2) Enviamos el token al servidor Flask para verificar y crear sesión
      const res  = await fetch("/login/google", {
        method:  "POST",
        headers: { "Content-Type": "application/json" },
        body:    JSON.stringify({ idToken }),
      });
      const data = await res.json();

      if (res.ok) {
        window.location.href = data.redirect;
      } else {
        mostrarError(data.error || "Error al autenticar con Google.");
        setBusy(false, "btnGoogle", null, true);  // restaurar botón Google
      }
    } catch (err) {
      // El usuario cerró el popup
      if (err.code !== "auth/popup-closed-by-user") {
        mostrarError("Error con Google Sign-In: " + (err.message || err));
      }
      setBusy(false, "btnGoogle", null, true);
    }
  }

  // ─────────────────────────────────────────────
  // HELPERS UI
  // ─────────────────────────────────────────────
  function mostrarError(msg) {
    const el = document.getElementById("errorBox");
    el.textContent = "⚠️  " + msg;
    el.classList.add("visible");
  }
  function ocultarError() {
    document.getElementById("errorBox").classList.remove("visible");
  }

  function setBusy(busy, btnId, texto, esGoogle = false) {
    const btn = document.getElementById(btnId);
    btn.disabled = busy;
    if (esGoogle) {
      btn.innerHTML = busy
        ? `<span class="spinner"></span> Conectando...`
        : `<svg class="google-icon" viewBox="0 0 48 48">
             <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
             <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
             <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
             <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.35-8.16 2.35-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
           </svg> Continuar con Google`;
    } else {
      btn.innerHTML = busy ? `<span class="spinner"></span> ${texto}` : texto;
    }
  }
</script>
</body>
</html>
