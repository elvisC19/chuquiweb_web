<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ChuquiWeb – Iniciar Sesión</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1F3864 0%, #2E75B6 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.25);
    }

    .logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo h1 {
      font-size: 32px;
      font-weight: 800;
      color: #1F3864;
      letter-spacing: -1px;
    }

    .logo p {
      font-size: 13px;
      color: #888;
      margin-top: 4px;
    }

    .divider {
      width: 48px;
      height: 4px;
      background: #2E75B6;
      border-radius: 2px;
      margin: 12px auto 0;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #444;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #E8EDF2;
      border-radius: 10px;
      font-size: 14px;
      color: #222;
      transition: border-color 0.2s;
      outline: none;
      margin-bottom: 20px;
    }

    input:focus { border-color: #2E75B6; }

    .error-box {
      background: #FFF0F0;
      border: 1px solid #FFCDD2;
      border-radius: 8px;
      padding: 10px 14px;
      color: #C62828;
      font-size: 13px;
      margin-bottom: 20px;
    }

    button[type="submit"] {
      width: 100%;
      padding: 14px;
      background: #1F3864;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    button[type="submit"]:hover { background: #2E75B6; }
    button[type="submit"]:active { transform: scale(0.98); }

    .footer {
      text-align: center;
      margin-top: 24px;
      font-size: 12px;
      color: #AAA;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <h1>ChuquiWeb</h1>
      <p>Marketplace de Importadoras</p>
      <div class="divider"></div>
    </div>

    {% if error %}
    <div class="error-box">⚠️ {{ error }}</div>
    {% endif %}

    <form method="POST">
      <label>Correo electrónico</label>
      <input type="email" name="email" placeholder="usuario@correo.com" required autofocus/>

      <label>Contraseña</label>
      <input type="password" name="password" placeholder="••••••••" required/>

      <button type="submit">Ingresar</button>
    </form>

    <div class="footer">ChuquiWeb © 2025 · Sistema de Gestión</div>
  </div>
</body>
</html>
